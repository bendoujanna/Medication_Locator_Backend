name: MedLocator CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    # Spins up a fresh PostgreSQL server inside GitHub just for testing
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: medlocator
          POSTGRES_USER: medlocator_user
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Django System Checks & Tests
      env:
        # Injecting safe dummy data so the decouple configuration doesn't crash during testing
        DEBUG: True
        SECRET_KEY: django-insecure-ci-pipeline-test-key-keep-safe
        ALLOWED_HOSTS: 127.0.0.1,localhost
        CORS_ALLOWED_ORIGINS: http://localhost:3000
        DATABASE_URL: postgresql://medlocator_user:testpassword@127.0.0.1:5432/medlocator
        FIREBASE_CREDENTIALS_PATH: ""
      run: |
        python manage.py check
        
        python manage.py makemigrations --check --dry-run
        
        python manage.py test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # Only deploy if the push is directly to your main deployment branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Trigger Render Deployment
      run: |
        curl -X POST "${{ secrets.RENDER_DEPLOY_WEBHOOK_URL }}"